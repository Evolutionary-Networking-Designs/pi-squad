name: Publish to Forgejo npm (stage)

on:
  push:
    tags:
      - "v*-beta.*"
      - "v*-next.*"
      - "v*-rc.*"
  workflow_dispatch:

jobs:
  publish-stage:
    name: Publish beta to internal registry
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://git.corp.meredithkm.info/api/packages/end/npm/"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish (beta, internal)
        run: npm publish --tag beta --ignore-scripts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.INTERNAL_NPM_TOKEN }}
