name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npmjs.com
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/coordinator/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag matches package version: $PKG_VERSION"

      - name: Publish
        run: npm publish --access public
        working-directory: packages/coordinator
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
